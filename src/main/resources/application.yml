spring:
  application:
    name: timetable-bot
    profiles:
      default: dev

    server:
      port: 8080

    management:
      endpoints:
        web:
          exposure:
            include: health,info

    admin:
      auth:
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:admin123}
        token: ${ADMIN_TOKEN:dev-admin-token}

    telegram:
      bot:
        enabled: ${TELEGRAM_BOT_ENABLED:false}
        token: ${TELEGRAM_BOT_TOKEN:}
        webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
        webhook-url: ${TELEGRAM_WEBHOOK_URL:}
        register-webhook-on-startup: ${TELEGRAM_REGISTER_WEBHOOK_ON_STARTUP:false}


    notifications:
      queue: ${NOTIFICATIONS_QUEUE:notifications.queue}
      task-reminder-lead-minutes: ${TASK_REMINDER_LEAD_MINUTES:30}
      scheduler-fixed-delay-ms: ${NOTIFICATIONS_SCHEDULER_FIXED_DELAY_MS:60000}

      dlq:
        exchange: ${NOTIFICATIONS_DLQ_EXCHANGE:notifications.dlx}
        queue: ${NOTIFICATIONS_DLQ_QUEUE:notifications.queue.dlq}
        routing-key: ${NOTIFICATIONS_DLQ_ROUTING_KEY:notifications.dead}